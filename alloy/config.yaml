name: Grafana Alloy
version: "1.2.0"
slug: alloy
description: >-
  Ship Home Assistant OS logs to Loki and host system metrics to Prometheus
  using Grafana Alloy. Replacement for the deprecated Promtail add-on, plus
  node_exporter-style host monitoring (CPU, memory, disk, network).
url: https://github.com/ecohash-co/ha-addon-alloy
codeowners:
  - "@ecohash-co"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
journald: true
host_network: true
host_pid: true
map:
  - addon_config:rw
  - share
  - media
  - backup
ports:
  12345/tcp: 12345
ports_description:
  12345/tcp: "Alloy debug UI"
watchdog: "http://[HOST]:[PORT:12345]/-/ready"
options:
  loki_url: "http://localhost:3100/loki/api/v1/push"
  prometheus_url: ""
  prometheus_username: ""
  prometheus_password: ""
  instance_name: homeassistant
  metrics_scrape_interval: 60s
  log_level: info
schema:
  loki_url: "url?"
  prometheus_url: "url?"
  prometheus_username: "str?"
  prometheus_password: "password?"
  instance_name: "str?"
  metrics_scrape_interval: "str?"
  log_level: "list(debug|info|warn|error)"
  additional_config: "str?"
stage: experimental
apparmor: false
